<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok — Educational Clone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #121212;
      color: #fff;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 60px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
    }

    /* TikTok note icon */
    .logo-icon {
      width: 32px;
      height: 32px;
    }

    .feedback-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      opacity: 0.9;
    }

    .feedback-btn:hover { opacity: 1; }

    /* ── Main ────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 60px;
    }

    .login-box {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 12px;
      color: #fff;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,.5);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* ── Buttons ─────────────────────────────────── */
    .login-options {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .login-btn {
      width: 100%;
      height: 48px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 4px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.15s;
    }

    .login-btn:hover {
      background: rgba(255,255,255,.14);
    }

    .btn-icon {
      position: absolute;
      left: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
    }

    /* ── Terms ───────────────────────────────────── */
    .terms {
      margin-top: 32px;
      font-size: 12px;
      color: rgba(255,255,255,.4);
      text-align: center;
      line-height: 1.7;
      padding: 0 10px;
    }

    .terms a {
      color: rgba(255,255,255,.65);
      text-decoration: none;
      font-weight: 500;
    }

    .terms a:hover { text-decoration: underline; }

    /* ── Sign up ─────────────────────────────────── */
    .signup-row {
      margin-top: 60px;
      font-size: 15px;
      color: rgba(255,255,255,.75);
      text-align: center;
    }

    .signup-row a {
      color: #FE2C55;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-row a:hover { text-decoration: underline; }

    /* ── Footer ──────────────────────────────────── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      margin-top: 40px;
    }

    .lang-btn {
      background: none;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 2px;
      color: #fff;
      font-size: 13px;
      padding: 6px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lang-btn:hover { border-color: rgba(255,255,255,.6); }

    .copyright {
      font-size: 13px;
      color: rgba(255,255,255,.5);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a href="#" class="logo">
      <!-- TikTok musical note icon -->
      <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="#010101"/>
        <path d="M22.5 8c.28 1.64 1.3 3.07 2.5 3.8v3.2c-1.4-.04-2.74-.47-3.87-1.24v5.64c0 3.64-2.98 6.6-6.63 6.6A6.63 6.63 0 0 1 8 19.4c0-3.64 2.98-6.6 6.63-6.6.23 0 .45.01.67.04v3.26a3.36 3.36 0 0 0-.67-.07 3.4 3.4 0 0 0-3.4 3.37 3.4 3.4 0 0 0 3.4 3.37 3.4 3.4 0 0 0 3.4-3.37V8h3.47z" fill="white"/>
        <path d="M22.5 8c.28 1.64 1.3 3.07 2.5 3.8v3.2c-1.4-.04-2.74-.47-3.87-1.24v5.64c0 3.64-2.98 6.6-6.63 6.6A6.63 6.63 0 0 1 8 19.4c0-3.64 2.98-6.6 6.63-6.6.23 0 .45.01.67.04v3.26a3.36 3.36 0 0 0-.67-.07 3.4 3.4 0 0 0-3.4 3.37 3.4 3.4 0 0 0 3.4 3.37 3.4 3.4 0 0 0 3.4-3.37V8h3.47z" fill="url(#tt-grad)" opacity="0.5"/>
        <defs>
          <linearGradient id="tt-grad" x1="8" y1="8" x2="25" y2="26" gradientUnits="userSpaceOnUse">
            <stop stop-color="#69C9D0"/>
            <stop offset="1" stop-color="#EE1D52"/>
          </linearGradient>
        </defs>
      </svg>
      TikTok
    </a>

    <button class="feedback-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      Feedback and help
    </button>
  </header>

  <!-- Main -->
  <main>
    <div class="login-box">
      <h1>Log in to TikTok</h1>
      <p class="subtitle">Manage your account, check notifications,<br>comment on videos, and more.</p>

      <div class="login-options">

        <!-- Use QR code -->
        <button class="login-btn">
          <span class="btn-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8">
              <rect x="3" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <path d="M14 14h2v2h-2zm4 0h2v2h-2zm-4 4h2v2h-2zm4-2v2h2v-2h-2z"/>
            </svg>
          </span>
          Use QR code
        </button>

        <!-- Use phone / email / username -->
        <button class="login-btn">
          <span class="btn-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          Use phone / email / username
        </button>

        <!-- Continue with Facebook -->
        <button class="login-btn">
          <span class="btn-icon">
            <svg width="22" height="22" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="12" fill="#1877F2"/>
              <path d="M16.5 8H14c-.3 0-.5.2-.5.5V10h3l-.4 2.5H13.5V18h-2.5v-5.5H9V10h2V8.5C11 6.6 12.2 5.5 14 5.5c.8 0 1.7.1 2.5.2V8z" fill="#fff"/>
            </svg>
          </span>
          Continue with Facebook
        </button>

        <!-- Continue with Google -->
        <button class="login-btn">
          <span class="btn-icon">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
          </span>
          Continue with Google
        </button>

        <!-- Continue with Apple -->
        <button class="login-btn">
          <span class="btn-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
          </span>
          Continue with Apple
        </button>

      </div>

      <!-- Terms -->
      <p class="terms">
        By continuing, you agree to TikTok's <a href="#">Terms of Service</a> and
        confirm that you have read TikTok's <a href="#">Privacy Policy</a>.
      </p>

      <!-- Sign up -->
      <div class="signup-row">
        Don't have an account? <a href="#">Sign up</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <button class="lang-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      English (US)
    </button>
    <span class="copyright">© 2026 TikTok</span>
  </footer>

</body>
</html>
